<script>
fetch("./media.json")
.then(res => {
    if (!res.ok) throw new Error("No se encontró media.json");
    return res.json();
})
.then(files => {

    const galeria = document.getElementById("galeria");

    files.forEach(file => {

        const card = document.createElement("div");
        card.className = "card";

        const ext = file.split('.').pop().toLowerCase();

        if (ext === "mp4") {

            const video = document.createElement("video");
            video.src = file;
            video.controls = true;
            video.playsInline = true;

            // 🔍 error si no carga video
            video.onerror = () => {
                console.log("❌ Video no encontrado:", file);
            };

            card.appendChild(video);

        } else {

            const img = document.createElement("img");
            img.src = file;
            img.loading = "lazy";

            // 🔍 error si no carga imagen
            img.onerror = () => {
                console.log("❌ Imagen no encontrada:", file);
                img.alt = "No se pudo cargar: " + file;
            };

            card.appendChild(img);
        }

        galeria.appendChild(card);
    });

})
.catch(err => {
    console.error("❌ Error cargando galería:", err);
    alert("No se pudieron cargar los recuerdos. Revisa media.json o rutas.");
});
</script>
