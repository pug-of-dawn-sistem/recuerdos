<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Recuerdos Pro</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE_BUCKET",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// 📤 SUBIR FOTO
window.uploadPhoto = async function () {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Selecciona una imagen");

  const storageRef = ref(storage, "fotos/" + Date.now() + file.name);
  await uploadBytes(storageRef, file);

  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "fotos"), {
    url: url,
    likes: 0,
    created: Date.now()
  });

  loadPhotos();
};

// ❤️ LIKE GLOBAL
window.likePhoto = async function (id) {
  const refDoc = doc(db, "fotos", id);
  await updateDoc(refDoc, {
    likes: increment(1)
  });

  loadPhotos();
};

// 🖼️ CARGAR FOTOS
async function loadPhotos() {
  const snap = await getDocs(collection(db, "fotos"));

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  snap.forEach((d) => {
    const data = d.data();

    gallery.innerHTML += `
      <div class="card">
        <img src="${data.url}">
        <div class="actions">
          <button onclick="likePhoto('${d.id}')">❤️ Like</button>
          <span>${data.likes || 0}</span>
        </div>
      </div>
    `;
  });
}

window.onload = loadPhotos;

</script>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }
header { text-align:center; padding:15px; background:#222; }

.upload { text-align:center; padding:10px; }

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card {
  background:#1c1c1c;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.actions {
  display:flex;
  justify-content:space-between;
  padding:8px;
}

button {
  background:#ff2d55;
  border:none;
  color:white;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
}
</style>

</head>

<body>

<header>📸 Recuerdos Pro</header>

<div class="upload">
  <input type="file" id="file">
  <button onclick="uploadPhoto()">📤 Subir foto</button>
</div>

<div class="gallery" id="gallery"></div>

</body>
</html>
